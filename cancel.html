<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helton Hotel — Manage Reservation</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:#C9A84C; --gold-light:#E8C97A; --dark:#0D0D0D; --dark2:#141414;
    --dark3:#1E1B16; --dark4:#2A2620; --text:#E8E0D0; --text-muted:#8A7F6E;
    --border:rgba(201,168,76,0.25); --danger:#C0392B;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--dark); color:var(--text);
    font-family:'Montserrat',sans-serif; font-weight:300;
    min-height:100vh; padding:40px 20px;
    display:flex; align-items:center; justify-content:center;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 10%,rgba(201,168,76,0.06) 0%,transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%,rgba(201,168,76,0.04) 0%,transparent 60%);
  }
  .wrap{max-width:520px;width:100%}
  .header{text-align:center;margin-bottom:32px}
  .stars{font-size:0.75rem;letter-spacing:0.4em;color:var(--gold);opacity:0.6;margin-bottom:14px}
  .title{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(2rem,6vw,3rem); font-weight:300;
    letter-spacing:0.15em; color:var(--gold); text-transform:uppercase;
  }
  .tagline{
    font-size:0.7rem; letter-spacing:0.3em; color:var(--text-muted);
    text-transform:uppercase; margin-top:8px;
  }
  .card{
    background:var(--dark3); border:1px solid var(--border); border-radius:2px;
    padding:36px 32px;
  }
  .section-title{
    font-family:'Cormorant Garamond',serif; font-size:1.6rem;
    font-weight:400; color:var(--gold-light); text-align:center; margin-bottom:6px;
  }
  .section-subtitle{
    text-align:center; font-size:0.7rem; letter-spacing:0.3em;
    color:var(--text-muted); text-transform:uppercase; margin-bottom:28px;
  }
  .row{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid rgba(255,255,255,0.04);font-size:0.82rem}
  .row:first-child{border-top:none}
  .row .key{color:var(--text-muted);text-transform:uppercase;letter-spacing:0.2em;font-size:0.66rem}
  .row .val{color:var(--text);text-align:right}
  .ref{
    text-align:center; padding:18px; margin:8px 0 22px;
    background:rgba(201,168,76,0.08); border:1px solid rgba(201,168,76,0.25);
  }
  .ref .label{font-size:0.62rem;letter-spacing:0.3em;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px}
  .ref .code{font-size:1.5rem;letter-spacing:0.25em;color:var(--gold-light)}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;
    padding:14px 28px; font-family:'Montserrat',sans-serif;
    font-size:0.7rem;letter-spacing:0.25em;text-transform:uppercase;font-weight:500;
    cursor:pointer;border:1px solid transparent;border-radius:2px;
    transition:all 0.2s; width:100%; margin-top:14px;
  }
  .btn-danger{background:rgba(192,57,43,0.18);color:#E74C3C;border-color:rgba(192,57,43,0.4)}
  .btn-danger:hover{background:rgba(192,57,43,0.3)}
  .btn-danger:disabled{opacity:0.5;cursor:not-allowed}
  .btn-outline{background:transparent;color:var(--gold);border-color:var(--gold)}
  .btn-outline:hover{background:rgba(201,168,76,0.08)}
  .alert{
    padding:14px 18px;border-radius:2px;font-size:0.8rem;line-height:1.6;
    display:none;margin-top:18px;
  }
  .alert.show{display:block}
  .alert-error{background:rgba(192,57,43,0.12);border:1px solid rgba(192,57,43,0.4);color:#E74C3C}
  .alert-success{background:rgba(39,174,96,0.12);border:1px solid rgba(39,174,96,0.4);color:#2ECC71}
  .badge{
    display:inline-block;padding:3px 10px;font-size:0.6rem;letter-spacing:0.2em;
    text-transform:uppercase;border-radius:1px;font-weight:500;
  }
  .badge-confirmed{background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid rgba(201,168,76,0.3)}
  .badge-cancelled{background:rgba(192,57,43,0.15);color:#E74C3C;border:1px solid rgba(192,57,43,0.3)}
  .loading{text-align:center;color:var(--text-muted);font-size:0.78rem;padding:30px 0}
  .home-link{
    display:block;text-align:center;margin-top:24px;
    font-size:0.66rem;letter-spacing:0.25em;color:var(--text-muted);
    text-transform:uppercase;text-decoration:none;
  }
  .home-link:hover{color:var(--gold)}
  @media(max-width:480px){
    .card{padding:26px 20px}
    .title{font-size:2rem;letter-spacing:0.1em}
  }
  /* ── Language toggle ── */
  .lang-toggle {
    position: fixed; top: 14px; right: 14px; z-index: 300;
    background: rgba(13,13,13,0.85); backdrop-filter: blur(8px);
    border: 1px solid var(--border); color: var(--gold-light);
    font-family: 'Montserrat', sans-serif;
    font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase;
    padding: 8px 16px; border-radius: 2px; cursor: pointer; transition: all 0.2s;
  }
  .lang-toggle:hover { background: rgba(201,168,76,0.1); color: var(--gold); border-color: var(--gold); }
  body.rtl-active .lang-toggle { right: auto; left: 14px; }
  body.rtl-active { text-align: right; }
  body.rtl-active .title, body.rtl-active .tagline,
  body.rtl-active .section-title, body.rtl-active .section-subtitle,
  body.rtl-active .stars, body.rtl-active .header { text-align: center; }
  body.rtl-active .row { flex-direction: row-reverse; }
  body.rtl-active .row .key { text-align: right; }
  body.rtl-active .row .val { text-align: left; }
</style>
</head>
<body>
<button class="lang-toggle" id="lang-toggle" onclick="toggleLang()">العربية</button>
<div class="wrap">
  <div class="header">
    <div class="stars">★ ★ ★ ★ ★</div>
    <h1 class="title">Helton Hotel</h1>
    <p class="tagline" data-i18n="manage_heading">Manage Reservation</p>
  </div>

  <div class="card" id="card">
    <div class="loading" id="loading">…</div>

    <div id="content" style="display:none;">
      <p class="section-title" id="title-line" data-i18n="your_res">Your Reservation</p>
      <p class="section-subtitle" id="status-line"></p>

      <div class="ref">
        <div class="label" data-i18n="ref_label">Reference</div>
        <div class="code" id="ref-code">—</div>
      </div>

      <div id="details"></div>

      <div class="alert alert-error" id="err"></div>
      <div class="alert alert-success" id="ok"></div>

      <div id="actions">
        <button class="btn btn-danger" id="cancel-btn" data-i18n="cancel_btn">Cancel My Reservation</button>
        <a class="btn btn-outline" href="/" style="text-decoration:none;" data-i18n="back_home">← Back to Hotel</a>
      </div>
    </div>
  </div>

  <a class="home-link" href="/">heltonhotel.com</a>
</div>

<script>
// ── I18N (same keys as index.html; trimmed to what this page uses) ──
const TRANSLATIONS = {
  en: {
    manage_heading: 'Manage Reservation',
    your_res: 'Your Reservation',
    ref_label: 'Reference',
    cancel_btn: 'Cancel My Reservation',
    back_home: '← Back to Hotel',
    status_confirmed: 'Confirmed', status_cancelled: 'Cancelled',
    sum_guest: 'Guest', sum_checkin: 'Check-In', sum_checkout: 'Check-Out',
    sum_nights: 'Nights', sum_room: 'Room', sum_total: 'Total',
    already_cancelled: 'This reservation has already been cancelled.',
    cancel_success: 'Your reservation has been cancelled. A confirmation has been emailed to you.',
    loading: 'Loading your reservation…',
    err_link_incomplete: 'This link is incomplete. Please use the original link from your confirmation email.',
    err_generic: 'Could not load this reservation.',
    err_server: 'Could not reach the server. Please try again.',
    confirm_cancel: 'Cancel this reservation? This action cannot be undone.',
    cancelling: 'Cancelling…',
    cannot_load: 'Cannot load reservation',
    lang_toggle: 'العربية'
  },
  ar: {
    manage_heading: 'إدارة الحجز',
    your_res: 'حجزك',
    ref_label: 'الرمز',
    cancel_btn: 'إلغاء حجزي',
    back_home: '→ العودة إلى الفندق',
    status_confirmed: 'مؤكد', status_cancelled: 'ملغى',
    sum_guest: 'الضيف', sum_checkin: 'الوصول', sum_checkout: 'المغادرة',
    sum_nights: 'الليالي', sum_room: 'الغرفة', sum_total: 'الإجمالي',
    already_cancelled: 'هذا الحجز ملغى بالفعل.',
    cancel_success: 'تم إلغاء حجزك. تم إرسال تأكيد إلى بريدك الإلكتروني.',
    loading: 'جارٍ تحميل الحجز…',
    err_link_incomplete: 'الرابط غير مكتمل. يرجى استخدام الرابط الأصلي من بريد التأكيد.',
    err_generic: 'تعذّر تحميل هذا الحجز.',
    err_server: 'تعذّر الاتصال بالخادم. يرجى المحاولة لاحقًا.',
    confirm_cancel: 'هل تريد إلغاء هذا الحجز؟ لا يمكن التراجع عن هذا الإجراء.',
    cancelling: 'جارٍ الإلغاء…',
    cannot_load: 'تعذّر تحميل الحجز',
    lang_toggle: 'English'
  }
};
let currentLang = localStorage.getItem('helton_lang') === 'ar' ? 'ar' : 'en';
function t(k){ return (TRANSLATIONS[currentLang]&&TRANSLATIONS[currentLang][k]) || TRANSLATIONS.en[k] || k; }
function applyLang() {
  document.documentElement.lang = currentLang;
  document.documentElement.dir  = currentLang === 'ar' ? 'rtl' : 'ltr';
  document.body.classList.toggle('rtl-active', currentLang === 'ar');
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.getAttribute('data-i18n')));
  const btn = document.getElementById('lang-toggle');
  if (btn) btn.textContent = t('lang_toggle');
  document.getElementById('loading').textContent = t('loading');
}
function toggleLang(){
  currentLang = currentLang === 'ar' ? 'en' : 'ar';
  localStorage.setItem('helton_lang', currentLang);
  applyLang();
  if (lastBooking) renderBooking(lastBooking); // re-render status + details in new language
}
applyLang();

const params = new URLSearchParams(location.search);
const ref   = params.get('ref');
const token = params.get('token');
const exp   = params.get('exp') || params.get('expiry');

const $ = (id) => document.getElementById(id);
let lastBooking = null;
const fmtRoom = (b) => {
  const en = TRANSLATIONS[currentLang] || TRANSLATIONS.en;
  const typeNames = {1: currentLang==='ar' ? 'غرفة مزدوجة' : 'Double Room', 2: currentLang==='ar' ? 'جناح' : 'Suite'};
  const viewNames = {1: currentLang==='ar' ? 'المسبح والحديقة' : 'Pool & Garden', 2: currentLang==='ar' ? 'السطح والحديقة' : 'Roof & Garden'};
  const typ = typeNames[b.room?.type] || '—';
  const vw  = viewNames[b.room?.view] || '—';
  return `${typ} · ${vw}`;
};

function showError(msg) {
  $('loading').style.display = 'none';
  $('content').style.display = 'block';
  $('actions').style.display = 'none';
  $('title-line').textContent = t('cannot_load');
  $('status-line').textContent = '';
  $('details').innerHTML = '';
  $('err').textContent = msg;
  $('err').classList.add('show');
}

function renderBooking(b) {
  lastBooking = b;
  $('loading').style.display = 'none';
  $('content').style.display = 'block';
  $('ref-code').textContent = b.ref || ref;
  const cancelled = b.status === 'cancelled';
  $('status-line').innerHTML = cancelled
    ? `<span class="badge badge-cancelled">${t('status_cancelled')}</span>`
    : `<span class="badge badge-confirmed">${t('status_confirmed')}</span>`;
  $('details').innerHTML = `
    <div class="row"><span class="key">${t('sum_guest')}</span><span class="val">${b.guest?.name || '—'}</span></div>
    <div class="row"><span class="key">${t('sum_checkin')}</span><span class="val">${b.checkin || '—'}</span></div>
    <div class="row"><span class="key">${t('sum_checkout')}</span><span class="val">${b.checkout || '—'}</span></div>
    <div class="row"><span class="key">${t('sum_nights')}</span><span class="val">${b.nights || '—'}</span></div>
    <div class="row"><span class="key">${t('sum_room')}</span><span class="val">${fmtRoom(b)}</span></div>
    <div class="row"><span class="key">${t('sum_total')}</span><span class="val" style="color:var(--gold-light)">$${b.totals?.grand ?? 0}</span></div>
  `;
  if (cancelled) {
    $('cancel-btn').style.display = 'none';
    $('ok').textContent = t('already_cancelled');
    $('ok').classList.add('show');
  }
}

async function load() {
  if (!ref || !token || !exp) {
    showError(t('err_link_incomplete'));
    return;
  }
  try {
    const r = await fetch(`/api/cancel?ref=${encodeURIComponent(ref)}&token=${encodeURIComponent(token)}&exp=${encodeURIComponent(exp)}`);
    const body = await r.json().catch(() => ({}));
    if (!r.ok || !body.ok) {
      showError(body.error || t('err_generic'));
      return;
    }
    renderBooking(body.booking);
  } catch (e) {
    showError(t('err_server'));
  }
}

$('cancel-btn').addEventListener('click', async () => {
  if (!confirm(t('confirm_cancel'))) return;
  const btn = $('cancel-btn');
  btn.disabled = true;
  btn.textContent = t('cancelling');
  $('err').classList.remove('show');
  try {
    const r = await fetch('/api/cancel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ref, token, exp })
    });
    const body = await r.json().catch(() => ({}));
    if (!r.ok || !body.ok) {
      $('err').textContent = body.error || t('err_generic');
      $('err').classList.add('show');
      btn.disabled = false;
      btn.textContent = t('cancel_btn');
      return;
    }
    renderBooking(body.booking);
    $('ok').textContent = body.alreadyCancelled ? t('already_cancelled') : t('cancel_success');
    $('ok').classList.add('show');
  } catch (e) {
    $('err').textContent = t('err_server');
    $('err').classList.add('show');
    btn.disabled = false;
    btn.textContent = t('cancel_btn');
  }
});

load();
</script>
</body>
</html>
